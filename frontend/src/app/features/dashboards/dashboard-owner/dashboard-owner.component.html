<header class="main-header">
  <h1 class="main-header__title">{{ 'dashboard.owner.welcome' | translate }}</h1>
  <p class="main-header__subtitle">{{ 'dashboard.owner.subtitle' | translate }}</p>
</header>

<section class="welcome-banner">
  <p class="welcome-banner__greeting">
    {{ 'dashboard.owner.greeting' | translate: {name: nombreUsuario} }} 🐾
  </p>
  <p class="welcome-banner__text">
    {{ 'dashboard.owner.banner' | translate }}
  </p>
</section>

<section class="quick-access">
  <h2 class="quick-access__title">{{ 'dashboard.owner.quickAccess' | translate }}</h2>

  <div class="quick-access__grid">

    <app-quick-card route="/feed" iconClass="quick-card__icon--blue" [titulo]="'dashboard.owner.cards.findMatch' | translate" [descripcion]="'dashboard.owner.cards.findMatchDesc' | translate">
      <svg card-icon xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
      </svg>
    </app-quick-card>

    <app-quick-card route="#" iconClass="quick-card__icon--green" [titulo]="'dashboard.owner.cards.publications' | translate" [descripcion]="'dashboard.owner.cards.publicationsDesc' | translate">
      <svg card-icon xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>
      </svg>
    </app-quick-card>

    <app-quick-card route="#" iconClass="quick-card__icon--purple" [titulo]="'dashboard.owner.cards.chats' | translate" [descripcion]="'dashboard.owner.cards.chatsDesc' | translate">
      <svg card-icon xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </app-quick-card>

    <app-quick-card route="/pets/list-pets" iconClass="quick-card__icon--orange" [titulo]="'dashboard.owner.cards.myPets' | translate" [descripcion]="'dashboard.owner.cards.myPetsDesc' | translate">
      <svg card-icon xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="4" r="2"/><circle cx="18" cy="8" r="2"/><circle cx="20" cy="16" r="2"/>
        <path d="M9 10a5 5 0 0 1 5 5v3.5a3.5 3.5 0 0 1-6.84 1.045Q6.52 17.48 4.46 16.84A3.5 3.5 0 0 1 5.5 10Z"/>
      </svg>
    </app-quick-card>

  </div>
</section>
