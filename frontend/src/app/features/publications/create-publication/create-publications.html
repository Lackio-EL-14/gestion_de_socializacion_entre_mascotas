<div class="layout">
  <app-sidebar-owner></app-sidebar-owner>

  <main class="main-content">
    <a routerLink="/publications" class="back-link">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Volver a Publicaciones
    </a>

    <header class="page-header">
      <h1 class="page-header__title">Crear Publicación</h1>
      <p class="page-header__subtitle">Comparte momentos especiales de tu mascota</p>
    </header>

    <div class="create-card">
      <form class="create-form" id="formCrearPublicacion" action="#" method="POST" enctype="multipart/form-data" novalidate>
        <div class="form-group">
          <label class="form-label">Subir Imagen</label>

          <label for="inputImagen" class="upload-zone" id="uploadZone">
            <div class="upload-zone__placeholder" id="uploadPlaceholder">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="16 16 12 12 8 16"></polyline>
                <line x1="12" y1="12" x2="12" y2="21"></line>
                <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"></path>
              </svg>
              <span class="upload-zone__text">Click para subir imagen</span>
              <span class="upload-zone__hint">PNG, JPG hasta 10MB</span>
            </div>

            <div class="upload-zone__preview hidden" id="uploadPreview">
              <img src="" alt="Preview" class="upload-zone__preview-img" id="previewImg" />
              <button type="button" class="upload-zone__remove" id="btnRemoveImg" aria-label="Quitar imagen">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
                  <line x1="18" y1="6" x2="6" y2="18"></line>
                  <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
              </button>
            </div>

            <input type="file" id="inputImagen" name="imagen" class="upload-zone__input" accept="image/png, image/jpeg, image/webp" />
          </label>
        </div>

        <div class="form-group">
          <label for="inputDescripcion" class="form-label">Descripción Breve</label>
          <textarea id="inputDescripcion" name="descripcion" class="form-textarea" placeholder="¿Qué está pasando? Comparte algo sobre tu mascota..." rows="3" maxlength="500"></textarea>
          <span class="form-textarea__counter">
            <span id="charCount">0</span>/500
          </span>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-publish">Publicar</button>
          <button type="reset" class="btn-discard" id="btnDescartar">Descartar</button>
        </div>
      </form>
    </div>
  </main>
</div>
