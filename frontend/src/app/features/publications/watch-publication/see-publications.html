<div class="layout">
  <app-sidebar-owner></app-sidebar-owner>

  <main class="main-content">
    <header class="page-header">
      <h1 class="page-header__title">{{ 'publications.see.title' | translate }}</h1>
      <p class="page-header__subtitle">{{ 'publications.see.subtitle' | translate }}</p>
    </header>

    <section class="feed" id="feedContainer">
      <article class="post-card">
        <div class="post-card__header">
          <div class="post-card__avatar-wrap">
            <img src="" [alt]="'publications.see.avatarAlt' | translate" class="post-card__avatar" />
            <div class="post-card__avatar-initials"></div>
          </div>
          <div class="post-card__meta">
            <span class="post-card__username"></span>
            <span class="post-card__date"></span>
          </div>
        </div>

        <div class="post-card__image-wrap">
          <img src="" [alt]="'publications.see.imageAlt' | translate" class="post-card__image" />
          <div class="post-card__image-placeholder">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle>
              <polyline points="21 15 16 10 5 21"></polyline>
            </svg>
          </div>
        </div>

        <div class="post-card__actions">
          <button type="button" class="post-action" id="btnLike" [attr.aria-label]="'publications.see.likeLabel' | translate">
            <svg class="post-action__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
            </svg>
            <span class="post-action__count"></span>
          </button>

          <button type="button" class="post-action" [attr.aria-label]="'publications.see.commentsLabel' | translate">
            <svg class="post-action__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            <span class="post-action__count"></span>
          </button>
        </div>

        <p class="post-card__description"></p>
      </article>

      <div class="feed-empty" id="feedEmpty">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle>
          <polyline points="21 15 16 10 5 21"></polyline>
        </svg>
        <p>
          {{ 'publications.see.empty.line1' | translate }}<br />
          {{ 'publications.see.empty.line2' | translate }}
        </p>
      </div>

      <div class="feed-loading" id="feedLoading">
        <div class="feed-loading__spinner"></div>
        <span>{{ 'publications.see.loading' | translate }}</span>
      </div>
    </section>

    <a routerLink="/publications/create-publication" class="fab" [attr.aria-label]="'publications.see.createButtonLabel' | translate" id="btnCrearPost">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="5" x2="12" y2="19"></line>
        <line x1="5" y1="12" x2="19" y2="12"></line>
      </svg>
    </a>
  </main>
</div>
