<div class="report-page">
  <div class="report-overlay">
    <div class="report-card">

      <button type="button" class="close-btn" (click)="cancelar()" [attr.aria-label]="'reports.create.close' | translate">
        ×
      </button>

      <h1 class="report-title">{{ 'reports.create.title' | translate }}</h1>

      <form class="report-form" (ngSubmit)="submit()" novalidate>
        <div class="form-group">
          <label for="motivo">{{ 'reports.create.form.subjectLabel' | translate }}</label>
          <input
            type="text"
            id="motivo"
            name="motivo"
            [(ngModel)]="motivo"
            [placeholder]="'reports.create.form.subjectPlaceholder' | translate"
          />
        </div>

        <div class="form-group">
          <label for="usuario-reportado">{{ 'reports.create.form.reportedUserLabel' | translate }}</label>
          <input
            type="text"
            id="usuario-reportado"
            [value]="idUsuarioReportado ?? ''"
            readonly
          />
        </div>

        <div class="form-group">
          <label for="comentario">{{ 'reports.create.form.commentLabel' | translate }}</label>
          <textarea
            id="comentario"
            name="comentario"
            [(ngModel)]="comentario"
            rows="4"
            [placeholder]="'reports.create.form.commentPlaceholder' | translate"
          ></textarea>
        </div>

        <div class="actions">
          <button type="submit" class="btn-send" [disabled]="enviando">
            {{ enviando ? ('reports.common.sending' | translate) : ('reports.create.form.submit' | translate) }}
          </button>

          <button type="button" class="btn-cancel" (click)="cancelar()">
            {{ 'reports.common.cancel' | translate }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<div class="modal-overlay" *ngIf="modalVisible">
  <div class="modal-card">
    <div class="modal-icon" [ngClass]="modalTipo">
      <span *ngIf="modalTipo === 'success'">✓</span>
      <span *ngIf="modalTipo === 'error'">!</span>
    </div>

    <h2 class="modal-title">{{ modalTitulo }}</h2>
    <p class="modal-message">{{ modalMensaje }}</p>

    <button type="button" class="modal-btn" (click)="cerrarModal()">
      {{ 'reports.common.accept' | translate }}
    </button>
  </div>
</div>
