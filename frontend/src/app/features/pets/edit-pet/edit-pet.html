<div class="edit-page">
  <div class="top-link">
    <button type="button" class="back-btn" routerLink="/pets/list-pets">
      ← {{ 'pets.common.backToMyPets' | translate }}
    </button>
  </div>

  <div class="page-header">
    <h1>{{ 'pets.edit.title' | translate }}</h1>
    <p>{{ 'pets.edit.subtitle' | translate }}</p>
  </div>

  <div class="edit-card">
    <div *ngIf="cargando" class="state-message">
      {{ 'pets.edit.loading' | translate }}
    </div>

    <form *ngIf="!cargando" class="pet-form" (ngSubmit)="submit()" novalidate>
      <div class="form-group">
        <label class="form-label">{{ 'pets.edit.photoLabel' | translate }}</label>

        <div class="image-box">
          <img
            class="pet-image"
            [src]="vacuna_imagen_url || imagenPlaceholder"
            [alt]="nombre || 'Mascota'"
          />

          <button type="button" class="change-photo-btn">
            {{ 'pets.edit.changePhoto' | translate }}
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="nombre" class="form-label">{{ 'pets.edit.form.nameLabel' | translate }}</label>
        <input
          type="text"
          id="nombre"
          name="nombre"
          class="form-input"
          [(ngModel)]="nombre"
          required
        />
      </div>

      <div class="form-group">
        <label for="raza" class="form-label">{{ 'pets.edit.form.breedLabel' | translate }}</label>
        <input
          type="text"
          id="raza"
          name="raza"
          class="form-input"
          [(ngModel)]="raza"
          required
        />
      </div>

      <div class="form-group">
        <label for="tamano" class="form-label">{{ 'pets.edit.form.sizeLabel' | translate }}</label>
        <select
          id="tamano"
          name="tamano"
          class="form-input"
          [(ngModel)]="tamano"
          required
        >
          <option value="">{{ 'pets.common.selectPlaceholder' | translate }}</option>
          <option value="Pequeno">{{ 'pets.common.size.small' | translate }}</option>
          <option value="Mediano">{{ 'pets.common.size.medium' | translate }}</option>
          <option value="Grande">{{ 'pets.common.size.large' | translate }}</option>
        </select>
      </div>

      <div class="form-group">
        <label for="genero" class="form-label">{{ 'pets.edit.form.genderLabel' | translate }}</label>
        <select
          id="genero"
          name="genero"
          class="form-input"
          [(ngModel)]="genero"
          required
        >
          <option value="">{{ 'pets.common.selectPlaceholder' | translate }}</option>
          <option value="Macho">{{ 'pets.common.gender.male' | translate }}</option>
          <option value="Hembra">{{ 'pets.common.gender.female' | translate }}</option>
        </select>
      </div>

      <div class="form-group">
        <label for="edad" class="form-label">{{ 'pets.edit.form.ageLabel' | translate }}</label>
        <input
          type="number"
          id="edad"
          name="edad"
          class="form-input"
          [(ngModel)]="edad"
          required
        />
      </div>

      <div class="form-group">
        <label for="vacuna" class="form-label">{{ 'pets.edit.form.vaccineLabel' | translate }}</label>
        <input
          type="file"
          id="vacuna"
          name="vacuna"
          class="form-input"
        />
        <small class="form-help">{{ 'pets.edit.form.vaccineHelp' | translate }}</small>
      </div>

      <div class="actions">
        <button type="submit" class="btn-submit" [disabled]="enviando">
          {{ enviando ? ('pets.edit.form.submitting' | translate) : ('pets.edit.form.submit' | translate) }}
        </button>

        <button type="button" class="btn-cancel" routerLink="/pets/list-pets">
          {{ 'pets.edit.form.cancel' | translate }}
        </button>
      </div>
    </form>
  </div>
</div>

<div class="modal-overlay" *ngIf="modalVisible">
  <div class="modal-card">
    <div class="modal-icon" [ngClass]="modalTipo">
      <span *ngIf="modalTipo === 'success'">✓</span>
      <span *ngIf="modalTipo === 'error'">!</span>
    </div>

    <h2 class="modal-title">{{ modalTitulo }}</h2>
    <p class="modal-message">{{ modalMensaje }}</p>

    <button type="button" class="modal-btn" (click)="cerrarModal()">
      {{ 'pets.common.accept' | translate }}
    </button>
  </div>
</div>
