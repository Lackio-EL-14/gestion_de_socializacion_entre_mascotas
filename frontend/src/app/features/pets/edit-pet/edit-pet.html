<div class="edit-page">
  <div class="top-link">
    <button type="button" class="back-btn" routerLink="/pets/list-pets">
      ← Volver a Mis Mascotas
    </button>
  </div>

  <div class="page-header">
    <h1>Editar Mascota</h1>
    <p>Actualiza la información de tu perrito</p>
  </div>

  <div class="edit-card">
    <div *ngIf="cargando" class="state-message">
      Cargando información de la mascota...
    </div>

    <form *ngIf="!cargando" class="pet-form" (ngSubmit)="submit()" novalidate>
      <div class="form-group">
        <label class="form-label">Foto de la Mascota</label>

        <div class="image-box">
          <img
            class="pet-image"
            [src]="vacuna_imagen_url || imagenPlaceholder"
            [alt]="nombre || 'Mascota'"
          />

          <button type="button" class="change-photo-btn">
            Cambiar
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="nombre" class="form-label">Nombre</label>
        <input
          type="text"
          id="nombre"
          name="nombre"
          class="form-input"
          [(ngModel)]="nombre"
          required
        />
      </div>

      <div class="form-group">
        <label for="raza" class="form-label">Raza</label>
        <input
          type="text"
          id="raza"
          name="raza"
          class="form-input"
          [(ngModel)]="raza"
          required
        />
      </div>

      <div class="form-group">
        <label for="tamano" class="form-label">Tamaño</label>
        <select
          id="tamano"
          name="tamano"
          class="form-input"
          [(ngModel)]="tamano"
          required
        >
          <option value="">Seleccionar</option>
          <option value="Pequeno">Pequeño</option>
          <option value="Mediano">Mediano</option>
          <option value="Grande">Grande</option>
        </select>
      </div>

      <div class="form-group">
        <label for="genero" class="form-label">Género</label>
        <select
          id="genero"
          name="genero"
          class="form-input"
          [(ngModel)]="genero"
          required
        >
          <option value="">Seleccionar</option>
          <option value="Macho">Macho</option>
          <option value="Hembra">Hembra</option>
        </select>
      </div>

      <div class="form-group">
        <label for="edad" class="form-label">Edad</label>
        <input
          type="number"
          id="edad"
          name="edad"
          class="form-input"
          [(ngModel)]="edad"
          required
        />
      </div>

      <div class="form-group">
        <label for="vacuna" class="form-label">Actualizar Archivo de Vacunación</label>
        <input
          type="file"
          id="vacuna"
          name="vacuna"
          class="form-input"
        />
        <small class="form-help">PDF o imagen de la cartilla de vacunas</small>
      </div>

      <div class="actions">
        <button type="submit" class="btn-submit" [disabled]="enviando">
          {{ enviando ? 'Guardando cambios...' : 'Guardar Cambios' }}
        </button>

        <button type="button" class="btn-cancel" routerLink="/pets/list-pets">
          Cancelar
        </button>
      </div>
    </form>
  </div>
</div>

<div class="modal-overlay" *ngIf="modalVisible">
  <div class="modal-card">
    <div class="modal-icon" [ngClass]="modalTipo">
      <span *ngIf="modalTipo === 'success'">✓</span>
      <span *ngIf="modalTipo === 'error'">!</span>
    </div>

    <h2 class="modal-title">{{ modalTitulo }}</h2>
    <p class="modal-message">{{ modalMensaje }}</p>

    <button type="button" class="modal-btn" (click)="cerrarModal()">
      Aceptar
    </button>
  </div>
</div>
