<app-back-button route="/pets/list-pets" label="Volver a Mis Mascotas"></app-back-button>

<div class="page-header">
  <h1>Editar Mascota</h1>
  <p>Actualiza la información de tu perrito</p>
</div>

<div class="edit-card">
  <div *ngIf="cargando" class="state-message">
    Cargando información de la mascota...
  </div>

  <form *ngIf="!cargando" class="pet-form" (ngSubmit)="submit()" novalidate>
    <div class="form-group">
      <label class="form-label">Foto de la Mascota</label>
      <div class="image-box">
        <img class="pet-image" [src]="vacuna_imagen_url || imagenPlaceholder" [alt]="nombre || 'Mascota'" />
        <button type="button" class="change-photo-btn">Cambiar</button>
      </div>
    </div>

    <div class="actions">
      <button type="submit" class="btn-submit" [disabled]="enviando">
        {{ enviando ? 'Guardando cambios...' : 'Guardar Cambios' }}
      </button>

      <button type="button" class="btn-cancel" routerLink="/pets/list-pets">
        Cancelar
      </button>
    </div>
  </form>
</div>
<app-alert-modal
  [visible]="modalVisible"
  [titulo]="modalTitulo"
  [mensaje]="modalMensaje"
  [tipo]="modalTipo"
  (close)="cerrarModal()">
</app-alert-modal>
