<div class="page">
  <div class="sidebar">

  </div>
  <div class="content">
    <button class="back-button">← Volver a mis mascotas </button>
    <h1 class="page-title">Crear Mascota</h1>
    <p class="page-subtitle">Registra la información de tu nuevo perrito</p>
    <div class="pet-card">
      <form class="pet-form"[formGroup]="createPetForm" (ngSubmit)="submit()">
        <div class="photo-upload">
          <label for="image">Imagen</label>
          <input type="file" id="image" formControlName="image" />
        </div>
        <div class="form-group">
          <label for="name">Nombre</label>
          <input type="text" id="name" formControlName="name" />
        </div>
        <div class="form-group">
          <label for="breed">Raza</label>
          <input type="text" id="breed" formControlName="breed" />
        </div>
        <div class="form-group">
          <label for="size">Tamaño</label>
          <select id="size" formControlName="size">
            <option value="">Seleccionar</option>
            <option value="small">Pequeño</option>
            <option value="medium">Mediano</option>
            <option value="large">Grande</option>
          </select>
        </div>
        <div class="form-group">
          <label for="gender">Género</label>
          <select id="gender" formControlName="gender">
            <option value="">Seleccionar</option>
            <option value="male">Macho</option>
            <option value="female">Hembra</option>
          </select>
        </div>
        <div class="form-group">
          <label for="age">Edad</label>
          <input type="number" id="age" formControlName="age" />
        </div>
        <div class="file-upload">
          <label for="vaccineFile">Archivo de vacunas</label>
          <input type="file" id="vaccineFile" formControlName="vaccineFile" />
        </div>
        <button type="submit" class="btn-save">Crear Mascota</button>
      </form>
    </div>
  </div>
</div>
