<div class="layout">

  <!-- ===================== SIDEBAR ===================== -->
  <app-sidebar-owner></app-sidebar-owner>
  <!-- ===================== CONTENT ===================== -->
  <main class="main-content">
    <button type="button" class="back-btn" routerLink="/dashboard-owner">
      ← {{ 'pets.common.backToMyPets' | translate }}
    </button>

    <h1 class="page-title">{{ 'pets.create.title' | translate }}</h1>
    <p class="page-subtitle">{{ 'pets.create.subtitle' | translate }}</p>

    <div class="pet-card">
      <form class="pet-form" (ngSubmit)="submit()">
        <div class="photo-upload">
          <label for="image">{{ 'pets.create.form.imageLabel' | translate }}</label>
          <input type="file" id="image" (change)="onImageSelected($event)" />
        </div>

        <div class="form-group">
          <label for="name">{{ 'pets.create.form.nameLabel' | translate }}</label>
          <input type="text" id="name" [(ngModel)]="nombre" name="nombre" />
        </div>

        <div class="form-group">
          <label for="breed">{{ 'pets.create.form.breedLabel' | translate }}</label>
          <select id="breed" [(ngModel)]="raza" name="raza" required>
            <option value="">{{ 'pets.common.selectPlaceholder' | translate }}</option>
            <option *ngFor="let razaItem of razasDisponibles" [value]="razaItem.value">{{ razaItem.label }}</option>
          </select>
        </div>

        <div class="form-group">
          <label for="size">{{ 'pets.create.form.sizeLabel' | translate }}</label>
          <select id="size" [(ngModel)]="tamano" name="tamano">
            <option value="">{{ 'pets.common.selectPlaceholder' | translate }}</option>
            <option value="Pequeno">{{ 'pets.common.size.small' | translate }}</option>
            <option value="Mediano">{{ 'pets.common.size.medium' | translate }}</option>
            <option value="Grande">{{ 'pets.common.size.large' | translate }}</option>
          </select>
        </div>

        <div class="form-group">
          <label for="gender">{{ 'pets.create.form.genderLabel' | translate }}</label>
          <select id="gender" [(ngModel)]="genero" name="genero">
            <option value="">{{ 'pets.common.selectPlaceholder' | translate }}</option>
            <option value="Macho">{{ 'pets.common.gender.male' | translate }}</option>
            <option value="Hembra">{{ 'pets.common.gender.female' | translate }}</option>
          </select>
        </div>

        <div class="form-group">
          <label for="age">{{ 'pets.create.form.ageLabel' | translate }}</label>
          <input type="number" id="age" [(ngModel)]="edad" name="edad" min="1" max="30" step="1" required />
        </div>

        <div class="file-upload">
          <label for="vaccineFile">{{ 'pets.create.form.vaccineLabel' | translate }}</label>
          <input type="file" id="vaccineFile" (change)="onVaccineSelected($event)" />
        </div>

        <button type="submit" class="btn-save" [disabled]="enviando">
          {{ enviando ? ('pets.common.sending' | translate) : ('pets.create.form.submit' | translate) }}
        </button>
      </form>
    </div>
  </main>
</div>

<div class="modal-overlay" *ngIf="modalVisible">
  <div class="modal-card">
    <div class="modal-icon" [ngClass]="modalTipo">
      <span *ngIf="modalTipo === 'success'">✓</span>
      <span *ngIf="modalTipo === 'error'">!</span>
    </div>

    <h2 class="modal-title">{{ modalTitulo }}</h2>
    <p class="modal-message">{{ modalMensaje }}</p>

    <button type="button" class="modal-btn" (click)="cerrarModal()">
      {{ 'pets.common.accept' | translate }}
    </button>
  </div>
</div>
