<app-back-button route="/dashboard-owner" label="Volver a Mis Mascotas"></app-back-button>

<h1 class="page-title">Crear Mascota</h1>
<p class="page-subtitle">Registra la información de tu nuevo perrito</p>

<div class="pet-card">
  <form class="pet-form" (ngSubmit)="submit()">
    <div class="photo-upload">
      <label for="image">Imagen</label>
      <input type="file" id="image" (change)="onImageSelected($event)" />
    </div>
    <div class="form-group">
      <label for="name">Nombre</label>
      <input type="text" id="name" [(ngModel)]="nombre" name="nombre" />
    </div>
    <div class="form-group">
      <label for="breed">Raza</label>
      <input type="text" id="breed" [(ngModel)]="raza" name="raza" />
    </div>
    <div class="form-group">
      <label for="size">Tamaño</label>
      <select id="size" [(ngModel)]="tamano" name="tamano">
        <option value="">Seleccionar</option>
        <option value="Pequeno">Pequeño</option>
        <option value="Mediano">Mediano</option>
        <option value="Grande">Grande</option>
      </select>
    </div>
    <div class="form-group">
      <label for="gender">Género</label>
      <select id="gender" [(ngModel)]="genero" name="genero">
        <option value="">Seleccionar</option>
        <option value="Macho">Macho</option>
        <option value="Hembra">Hembra</option>
      </select>
    </div>
    <div class="form-group">
      <label for="age">Edad</label>
      <input type="number" id="age" [(ngModel)]="edad" name="edad" />
    </div>
    <div class="file-upload">
      <label for="vaccineFile">Archivo de vacunas</label>
      <input type="file" id="vaccineFile" (change)="onVaccineSelected($event)" />
    </div>
    <button type="submit" class="btn-save">Crear Mascota</button>
  </form>
</div>
<app-alert-modal
  [visible]="modalVisible"
  [titulo]="modalTitulo"
  [mensaje]="modalMensaje"
  [tipo]="modalTipo"
  (close)="cerrarModal()">
</app-alert-modal>
