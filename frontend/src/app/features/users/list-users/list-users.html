<div class="layout">
  <app-sidebar-owner></app-sidebar-owner>

  <main class="main-content">
    <header class="page-header">
      <h1 class="page-header__title">Usuarios</h1>
      <p class="page-header__subtitle">Explora otros dueños de mascotas en la plataforma</p>
    </header>

    <section class="search-card">
      <div class="search-box">
        <svg class="search-box__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>

        <input
          type="text"
          [(ngModel)]="busqueda"
          (input)="filtrarUsuarios()"
          placeholder="Buscar por nombre..."
          class="search-box__input"
        />
      </div>
    </section>

    <div *ngIf="cargando" class="state-message">
      Cargando usuarios...
    </div>

    <div *ngIf="error" class="state-message error">
      {{ error }}
    </div>

    <section *ngIf="!cargando && !error" class="table-card">
      <table class="users-table">
        <thead>
          <tr>
            <th>Foto</th>
            <th>Nombre</th>
            <th>Email</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngIf="usuariosFiltrados.length === 0">
            <td colspan="5" class="empty-cell">No se encontraron usuarios.</td>
          </tr>

          <tr *ngFor="let usuario of usuariosFiltrados">
            <td>
              <img
                class="user-photo"
                [src]="getFoto(usuario)"
                [alt]="usuario.nombre"
              />
            </td>

            <td class="user-name">{{ usuario.nombre }}</td>
            <td>{{ usuario.email }}</td>

            <td>
              <span class="status-badge" [ngClass]="getEstadoClase(usuario)">
                {{ getEstadoTexto(usuario) }}
              </span>
            </td>

            <td>
              <button type="button" class="view-btn" (click)="verPerfil(usuario.id_usuario)">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                  <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                Ver Perfil
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>
</div>
