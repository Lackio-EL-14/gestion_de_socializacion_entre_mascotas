<div class="page-wrapper">
  <div class="home-shell">

    <!-- Header -->
    <header class="topbar">
      <div class="brand">
        <div class="logo">
          <img src="dogchat-icon.png" alt="DogChat logo" class="logo-image" />
        </div>

        <h1 class="brand-name">DogChat</h1>
      </div>

      <div class="topbar-actions">
        <label class="language-switch" for="lang-switch">
          <span class="language-switch__label">{{ 'language.label' | translate }}</span>
          <select
            id="lang-switch"
            class="language-switch__select"
            [value]="selectedLanguage"
            (change)="onLanguageChange($any($event.target).value)"
          >
            <option *ngFor="let lang of languageOptions" [value]="lang">
              {{ ('language.' + lang) | translate }}
            </option>
          </select>
        </label>

        <a routerLink="/login" class="btn-login">{{ 'home.login' | translate }}</a>
      </div>
    </header>

    <!-- Hero -->
    <main class="hero">
      <h2 class="hero-title">{{ 'home.heroTitle' | translate }}</h2>
      <p class="hero-subtitle">
        {{ 'home.heroSubtitle' | translate }}
      </p>

      <!-- Cards -->
      <section class="role-cards">
        <article class="role-card owner-card" (click)="irARegistroDueno()">
          <div class="icon-circle icon-owner">
            <svg xmlns="http://www.w3.org/2000/svg" width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M20 21a8 8 0 0 0-16 0"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>

          <h3 class="role-title" [innerHTML]="('home.registerOwnerTitle' | translate).replace('\n', '<br>')"></h3>
          <p class="role-text">
            {{ 'home.registerOwnerText' | translate }}
          </p>
        </article>

        <article class="role-card worker-card" (click)="irARegistroTrabajador()">
          <div class="icon-circle icon-worker">
            <svg xmlns="http://www.w3.org/2000/svg" width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="#ea580c" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <rect x="2" y="7" width="20" height="14" rx="2"></rect>
              <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
            </svg>
          </div>

          <h3 class="role-title" [innerHTML]="('home.registerWorkerTitle' | translate).replace('\n', '<br>')"></h3>
          <p class="role-text">
            {{ 'home.registerWorkerText' | translate }}
          </p>
        </article>
      </section>
    </main>

  </div>
</div>
