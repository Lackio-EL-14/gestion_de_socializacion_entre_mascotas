<div class="layout">

    <!-- ===================== SIDEBAR ===================== -->
    <app-sidebar-owner></app-sidebar-owner>

    <!-- ===================== CONTENIDO PRINCIPAL ===================== -->
    <main class="main-content">

      <!-- Encabezado -->
      <div class="filters-header">
        <div>
          <h1 class="filters-header__title">{{ 'feed.filters.title' | translate }}</h1>
          <p class="filters-header__subtitle">{{ 'feed.filters.subtitle' | translate }}</p>
        </div>
        <!-- Botón cerrar / volver al feed -->
        <a
          [routerLink]="idMascota ? ['/feed/home', idMascota] : ['/feed']"
          class="filters-header__close"
          aria-label="Cerrar filtros"
        >
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="20" height="20">
            <line x1="18" y1="6" x2="6" y2="18"/>
            <line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </a>
      </div>

      <!-- Tarjeta de filtros -->
      <div class="filters-card">

        <form class="filters-form" id="filtersForm" (submit)="applyFilters($event)" novalidate>

          <!-- ── Raza ── -->
          <div class="filter-group">
            <label for="filterRaza" class="filter-label">{{ 'feed.filters.breed' | translate }}</label>
            <div class="select-wrap">
              <select
                id="filterRaza"
                name="raza"
                class="filter-select"
                [value]="filters.raza"
                (change)="filters.raza = $any($event.target).value"
              >
                <option value="">Todas las razas</option>
                <!-- Las opciones se cargarán dinámicamente desde el backend -->
                <option value="golden_retriever">Golden Retriever</option>
                <option value="labrador">Labrador</option>
                <option value="bulldog">Bulldog</option>
                <option value="poodle">Poodle</option>
                <option value="beagle">Beagle</option>
                <option value="chihuahua">Chihuahua</option>
                <option value="pastor_aleman">Pastor Alemán</option>
                <option value="husky">Husky Siberiano</option>
                <option value="shih_tzu">Shih Tzu</option>
                <option value="dalmata">Dálmata</option>
                <option value="otra">Otra</option>
              </select>
              <svg class="select-wrap__arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </div>
          </div>

          <!-- ── Edad (años) ── -->
          <div class="filter-group">
            <label class="filter-label">{{ 'feed.filters.age' | translate }}</label>
            <div class="filter-age-row">
              <div class="filter-age-item">
                <span class="filter-age-item__label">{{ 'feed.filters.ageMin' | translate }}</span>
                <input
                  type="number"
                  id="edadMin"
                  name="edad_min"
                  class="filter-input"
                  placeholder="0"
                  min="0"
                  max="20"
                  [value]="filters.edad_min"
                  (input)="filters.edad_min = $any($event.target).value"
                />
              </div>
              <div class="filter-age-item">
                <span class="filter-age-item__label">{{ 'feed.filters.ageMax' | translate }}</span>
                <input
                  type="number"
                  id="edadMax"
                  name="edad_max"
                  class="filter-input"
                  placeholder="20"
                  min="0"
                  max="20"
                  [value]="filters.edad_max"
                  (input)="filters.edad_max = $any($event.target).value"
                />
              </div>
            </div>
          </div>

          <!-- ── Tamaño ── -->
          <div class="filter-group">
            <label class="filter-label">{{ 'feed.filters.size' | translate }}</label>
            <div class="filter-size-group">

              <label class="size-option">
                <input
                  type="radio"
                  name="tamano"
                  value="pequeno"
                  class="size-option__input"
                  [checked]="filters.tamano === 'pequeno'"
                  (change)="filters.tamano = 'pequeno'"
                />
                <span class="size-option__btn">{{ 'feed.filters.small' | translate }}</span>
              </label>

              <label class="size-option">
                <input
                  type="radio"
                  name="tamano"
                  value="mediano"
                  class="size-option__input"
                  [checked]="filters.tamano === 'mediano'"
                  (change)="filters.tamano = 'mediano'"
                />
                <span class="size-option__btn">{{ 'feed.filters.medium' | translate }}</span>
              </label>

              <label class="size-option">
                <input
                  type="radio"
                  name="tamano"
                  value="grande"
                  class="size-option__input"
                  [checked]="filters.tamano === 'grande'"
                  (change)="filters.tamano = 'grande'"
                />
                <span class="size-option__btn">{{ 'feed.filters.large' | translate }}</span>
              </label>

            </div>
          </div>

          <!-- ── Estado de Salud ── -->
          <div class="filter-group">
            <label for="filterSalud" class="filter-label">{{ 'feed.filters.healthStatus' | translate }}</label>
            <div class="select-wrap">
              <select
                id="filterSalud"
                name="estado_salud"
                class="filter-select"
                [value]="filters.estado_salud"
                (change)="filters.estado_salud = $any($event.target).value"
              >
                <option value="">Todas las condiciones</option>
                <option value="saludable">{{ 'feed.filters.healthy' | translate }}</option>
                <option value="en_tratamiento">{{ 'feed.filters.inTreatment' | translate }}</option>
                <option value="enfermo">{{ 'feed.filters.sick' | translate }}</option>
              </select>
              <svg class="select-wrap__arrow" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="6 9 12 15 18 9"/>
              </svg>
            </div>
          </div>

          <!-- ── Género ── -->
          <div class="filter-group">
            <label class="filter-label">{{ 'feed.filters.gender' | translate }}</label>
            <div class="filter-size-group">

              <label class="size-option">
                <input
                  type="radio"
                  name="genero"
                  value="Macho"
                  class="size-option__input"
                  [checked]="filters.genero === 'Macho'"
                  (change)="filters.genero = 'Macho'"
                />
                <span class="size-option__btn">{{ 'feed.filters.male' | translate }}</span>
              </label>

              <label class="size-option">
                <input
                  type="radio"
                  name="genero"
                  value="Hembra"
                  class="size-option__input"
                  [checked]="filters.genero === 'Hembra'"
                  (change)="filters.genero = 'Hembra'"
                />
                <span class="size-option__btn">{{ 'feed.filters.female' | translate }}</span>
              </label>

            </div>
          </div>

          <!-- ── Botones de acción ── -->
          <div class="filter-actions">

            <button type="submit" class="btn-apply">
              {{ 'feed.filters.apply' | translate }}
            </button>

            <button type="button" class="btn-clear" id="btnClearFilters" (click)="clearFilters()">
              {{ 'feed.filters.clear' | translate }}
            </button>

          </div>

          <!-- Cancelar -->
          <div class="filter-cancel">
            <a
              [routerLink]="idMascota ? ['/feed/home', idMascota] : ['/feed']"
              class="btn-cancel"
            >
              {{ 'feed.filters.cancel' | translate }}
            </a>
          </div>

        </form>

      </div>

    </main>
  </div>
