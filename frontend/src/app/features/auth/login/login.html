<div class="page-wrapper">
  <div class="card">

    <!-- Logo -->
    <div class="logo">
      <img src="dogchat-icon.png" alt="DogChat logo" class="logo-image" />
    </div>

    <!-- Título -->
    <h1 class="brand-name">DogChat Admin</h1>
    <p class="brand-subtitle">{{ 'auth.login.subtitle' | translate }}</p>

    <!-- Formulario -->
    <form class="login-form" (ngSubmit)="iniciarSesion()" novalidate>

      <div class="form-group">
        <label for="email" class="form-label">{{ 'auth.login.form.emailLabel' | translate }}</label>
        <input
          type="text"
          id="email"
          name="email"
          class="form-input"
          [placeholder]="'auth.login.form.emailPlaceholder' | translate"
          autocomplete="username"
          [(ngModel)]="email"
          required
          maxlength="150"
        />
      </div>

      <div class="form-group">
        <label for="contrasena" class="form-label">{{ 'auth.login.form.passwordLabel' | translate }}</label>
        <input
          type="password"
          id="contrasena"
          name="contrasena"
          class="form-input"
          placeholder="••••••••"
          autocomplete="current-password"
          [(ngModel)]="contrasena"
          required
          minlength="6"
          maxlength="64"
        />
      </div>

      <a href="/request-reset" class="forgot-link">{{ 'auth.login.form.forgotPassword' | translate }}</a>

      <button type="submit" class="btn-submit" [disabled]="enviando">
        {{ enviando ? ('auth.login.form.submitting' | translate) : ('auth.login.form.submit' | translate) }}
      </button>

    </form>

  </div>
</div>
<div class="modal-overlay" *ngIf="modalVisible">
  <div class="modal-card">
    <div class="modal-icon" [ngClass]="modalTipo">
      <span *ngIf="modalTipo === 'success'">✓</span>
      <span *ngIf="modalTipo === 'error'">!</span>
    </div>

    <h2 class="modal-title">{{ modalTitulo }}</h2>
    <p class="modal-message">{{ modalMensaje }}</p>

    <button type="button" class="modal-btn" (click)="cerrarModal()">
      {{ 'auth.common.accept' | translate }}
    </button>
  </div>
</div>
