<h1 class="brand-name">DogChat Admin</h1>
<p class="brand-subtitle">Panel de Administración</p>

<form class="login-form" (ngSubmit)="iniciarSesion()" novalidate>
  <div class="form-group">
    <label for="email" class="form-label">Email o Nombre de Usuario</label>
    <input type="text" id="email" name="email" class="form-input" placeholder="admin@dogchat.com" autocomplete="username" [(ngModel)]="email" required maxlength="150" />
  </div>

  <div class="form-group">
    <label for="contrasena" class="form-label">Contraseña</label>
    <input type="password" id="contrasena" name="contrasena" class="form-input" placeholder="••••••••" autocomplete="current-password" [(ngModel)]="contrasena" required minlength="6" maxlength="64" />
  </div>

  <a routerLink="/request-reset" class="forgot-link">¿Te olvidaste? Recuperar contraseña</a>

  <button type="submit" class="btn-submit" [disabled]="enviando">
    {{ enviando ? 'Ingresando...' : 'Iniciar Sesión' }}
  </button>
</form>
<app-alert-modal
  [visible]="modalVisible"
  [titulo]="modalTitulo"
  [mensaje]="modalMensaje"
  [tipo]="modalTipo"
  (close)="cerrarModal()">
</app-alert-modal>
