  <div class="page-wrapper">
    <div class="card">

      <!-- Logo -->
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="white" width="44" height="44" aria-hidden="true">
          <!-- Orejas -->
          <ellipse cx="16" cy="18" rx="8" ry="11" transform="rotate(-15 16 18)" />
          <ellipse cx="48" cy="18" rx="8" ry="11" transform="rotate(15 48 18)" />
          <!-- Cara -->
          <circle cx="32" cy="36" r="20" />
          <!-- Ojos -->
          <circle cx="24" cy="31" r="3" fill="#2563eb" />
          <circle cx="40" cy="31" r="3" fill="#2563eb" />
          <!-- Nariz -->
          <ellipse cx="32" cy="38" rx="5" ry="3.5" fill="#2563eb" />
          <!-- Boca -->
          <path d="M27 42 Q32 47 37 42" stroke="#2563eb" stroke-width="2" fill="none" stroke-linecap="round"/>
        </svg>
      </div>

      <!-- Título -->
      <h1 class="brand-name">DogChat</h1>
      <p class="brand-subtitle">Crear cuenta de Dueño</p>

      <!-- Formulario -->
      <form class="register-form" (ngSubmit)="registro()" novalidate>

        <div class="form-group">
          <label for="nombre" class="form-label">Nombre</label>
          <input
            type="text"
            id="nombre"
            name="nombre"
            class="form-input"
            placeholder="Juan Pérez"
            autocomplete="name"
            [(ngModel)]="nombre"
            required
          />
        </div>

        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-input"
            placeholder="juan@example.com"
            autocomplete="email"
            [(ngModel)]="email"
            required
          />
        </div>

        <div class="form-group">
          <label for="telefono" class="form-label">Teléfono</label>
          <input
            type="tel"
            id="telefono"
            name="telefono"
            class="form-input"
            placeholder="+34 612 345 678"
            autocomplete="tel"
            [(ngModel)]="telefono"
            required
            maxlength="15"
          />
        </div>

        <div class="form-group">
          <label for="contrasena" class="form-label">Contraseña</label>
          <input
            type="password"
            id="contrasena"
            name="contrasena"
            class="form-input"
            placeholder="••••••••"
            autocomplete="new-password"
            [(ngModel)]="contrasena"
            required
            minlength="6"
          />
        </div>

        <div class="form-group">
          <label for="confirmar-contrasena" class="form-label">Confirmar Contraseña</label>
          <input
            type="password"
            id="confirmar-contrasena"
            name="confirmar_contrasena"
            class="form-input"
            placeholder="••••••••"
            autocomplete="new-password"
            [(ngModel)]="confirmarContrasena"
            required
            minlength="8"
          />
        </div>

        <button type="submit" class="btn-submit" [disabled]="enviando">
          {{ enviando ? 'Creando cuenta...' : 'Crear Cuenta' }}
        </button>

      </form>

      <!-- Footer del card -->
      <p class="login-redirect">
        ¿Ya tienes cuenta?
        <a routerLink="/login" class="login-link">Inicia sesión</a>
      </p>

    </div>
  </div>
  <div class="modal-overlay" *ngIf="modalVisible">
  <div class="modal-card">
    <div class="modal-icon" [ngClass]="modalTipo">
      <span *ngIf="modalTipo === 'success'">✓</span>
      <span *ngIf="modalTipo === 'error'">!</span>
    </div>

    <h2 class="modal-title">{{ modalTitulo }}</h2>
    <p class="modal-message">{{ modalMensaje }}</p>

    <button type="button" class="modal-btn" (click)="cerrarModal()">
      Aceptar
    </button>
  </div>
</div>
