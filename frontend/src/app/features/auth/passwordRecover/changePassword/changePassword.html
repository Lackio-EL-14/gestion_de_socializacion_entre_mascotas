<div class="page-wrapper">
  <div class="card">

    <div class="brand-name">{{ 'auth.passwordRecover.change.title' | translate }}</div>
    <div class="brand-subtitle">
      {{ 'auth.passwordRecover.change.subtitle' | translate }}
    </div>

    <form class="login-form" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label class="form-label" for="password">{{ 'auth.passwordRecover.change.form.passwordLabel' | translate }}</label>
        <input
          class="form-input"
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          placeholder="********"
          required
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="confirmPassword">{{ 'auth.passwordRecover.change.form.confirmPasswordLabel' | translate }}</label>
        <input
          class="form-input"
          type="password"
          id="confirmPassword"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          placeholder="********"
          required
        />
      </div>

      <button class="btn-submit" type="submit" [disabled]="enviando">
        {{ enviando ? ('auth.passwordRecover.change.form.submitting' | translate) : ('auth.passwordRecover.change.form.submit' | translate) }}
      </button>

    </form>
  </div>
</div>

<div class="modal-overlay" *ngIf="modalVisible">
  <div class="modal-card">
    <div class="modal-icon" [ngClass]="modalTipo">
      <span *ngIf="modalTipo === 'success'">✓</span>
      <span *ngIf="modalTipo === 'error'">!</span>
    </div>

    <h2 class="modal-title">{{ modalTitulo }}</h2>
    <p class="modal-message">{{ modalMensaje }}</p>

    <button type="button" class="modal-btn" (click)="cerrarModal()">
      {{ 'auth.common.accept' | translate }}
    </button>
  </div>
</div>
