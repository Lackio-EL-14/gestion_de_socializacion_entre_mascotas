<aside class="sidebar">
  <div class="sidebar__brand">
    <span class="sidebar__brand-name">DogChat</span>
  </div>

  <nav class="sidebar__nav">
    <ul class="sidebar__nav-list">

      <li class="sidebar__nav-item" routerLinkActive="sidebar__nav-item--active">
        <a routerLink="/dashboard-owner" class="sidebar__nav-link">
          <svg class="sidebar__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
          </svg>
          <span>Dashboard</span>
        </a>
      </li>

      <li class="sidebar__nav-item" routerLinkActive="sidebar__nav-item--active">
        <a routerLink="/feed" class="sidebar__nav-link">
          <svg class="sidebar__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/>
          </svg>
          <span>Buscar Match</span>
        </a>
      </li>

      <li class="sidebar__nav-item" routerLinkActive="sidebar__nav-item--active">
        <a routerLink="/pets/list-pets" class="sidebar__nav-link">
          <svg class="sidebar__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="4" r="2"/><circle cx="18" cy="8" r="2"/><circle cx="20" cy="16" r="2"/>
            <path d="M9 10a5 5 0 0 1 5 5v3.5a3.5 3.5 0 0 1-6.84 1.045Q6.52 17.48 4.46 16.84A3.5 3.5 0 0 1 5.5 10Z"/>
          </svg>
          <span>Mis Mascotas</span>
        </a>
      </li>

      <li class="sidebar__nav-item" routerLinkActive="sidebar__nav-item--active">
        <a routerLink="/dashboard-edit-owner" class="sidebar__nav-link">
          <svg class="sidebar__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
          <span>Configurar Perfil</span>
        </a>
      </li>

    </ul>
  </nav>

  <div class="sidebar__footer">
    <a (click)="logout()" class="sidebar__nav-link sidebar__logout">
      <svg class="sidebar__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span>Cerrar Sesión</span>
    </a>
  </div>
</aside>
