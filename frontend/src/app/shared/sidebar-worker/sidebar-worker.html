<aside class="sidebar">

  <div class="sidebar__brand">
    <span class="sidebar__brand-name" style="color: #2563eb;">DogChat Business</span>
  </div>

  <nav class="sidebar__nav">
    <ul class="sidebar__nav-list">

      <li class="sidebar__nav-item" routerLinkActive="sidebar__nav-item--active" [routerLinkActiveOptions]="{ exact: true }">
        <a routerLink="/dashboard-worker" class="sidebar__nav-link">
          <svg class="sidebar__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
          </svg>
          <span>{{ 'sidebar.dashboard' | translate }}</span>
        </a>
      </li>

      <li class="sidebar__nav-item" routerLinkActive="sidebar__nav-item--active">
        <a routerLink="/users/worker" class="sidebar__nav-link">
          <svg class="sidebar__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <span>{{ 'sidebar.searchUsers' | translate }}</span>
        </a>
      </li>

      <li class="sidebar__nav-item" routerLinkActive="sidebar__nav-item--active">
        <a routerLink="/publications/worker" class="sidebar__nav-link">
          <svg class="sidebar__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/>
          </svg>
          <span>{{ 'sidebar.publications' | translate }}</span>
        </a>
      </li>

      <li class="sidebar__nav-item" routerLinkActive="sidebar__nav-item--active">
        <a routerLink="/publications/my-publications" class="sidebar__nav-link">
          <svg class="sidebar__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
          </svg>
          <span>{{ 'sidebar.myPublications' | translate }}</span>
        </a>
      </li>

      <li class="sidebar__nav-item" routerLinkActive="sidebar__nav-item--active">
        <a routerLink="/worker/chats" class="sidebar__nav-link">
          <svg class="sidebar__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          <span>{{ 'sidebar.chats' | translate }}</span>
        </a>
      </li>

    </ul>
  </nav>

  <div class="sidebar__footer">
    <a href="#" class="sidebar__nav-link sidebar__logout">
      <svg class="sidebar__icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      <span>{{ 'sidebar.logout' | translate }}</span>
    </a>
  </div>

</aside>
